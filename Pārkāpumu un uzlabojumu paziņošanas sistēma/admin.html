<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Vadības panelis | Administrācija</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="admin-container">
<header>
    <h2>
        <span id="company-title">Iestādes</span> vadības panelis: 
        <span id="key-title" style="color: #0557af;">---</span>
    </h2>
    <a href="index.html" class="back-link" style="width: auto; margin: 0;">Iziet</a>
</header>

    <div class="filters">
        <div class="filter-group">
        <label>Veids:</label>
        <select id="filter-type" onchange="applyFilters()">
            <option value="all">Visi</option>
            <option value="pārkāpum">Pārkāpumi</option> 
            <option value="ieteikum">Ieteikumi</option>
            <option value="cits">Citi</option>
        </select>
        </div>
        <div class="filter-group">
            <label>Steidzamība:</label>
            <select id="filter-urgency" onchange="applyFilters()">
                <option value="all">Visas</option>
                <option value="augsta">Augsta</option>
                <option value="vidēja">Vidēja</option>
                <option value="zema">Zema</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Statuss:</label>
            <select id="filter-status" onchange="applyFilters()">
                <option value="all">Visi</option>
                <option value="jauns">Jauni</option>
                <option value="procesā">Procesā</option>
                <option value="atrisināti">Atrisināti</option>
            </select>
        </div>
        <button class="action-btn" style="width: auto; padding: 10px 15px; background: #f3f2f2; color: #363636; font-size: 13px;" onclick="resetFilters()">Notīrīt</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Datums</th>
                <th>ID</th>
                <th>Veids</th>
                <th>Ziņojums</th>
                <th>Steidzamība</th>
                <th>Statuss</th>
                <th>Darbība</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<div id="modal-overlay">
    <div class="modal">
        <h3>Ziņojuma slēgšana</h3>
        <p style="font-size: 13px; color: #686767;">Norādiet iemeslu vai veikto darbību:</p>
        <select id="close-reason">
            <option value="atrisinats">Problēma novērsta / Ieteikums ieviests</option>
            <option value="nepatiess">Ziņojums ir nepatiess / fake</option>
            <option value="nav-aktuals">Nav aktuāls</option>
            <option value="spam">Spams</option>
        </select>
        <textarea id="admin-comment" placeholder="Papildus komentārs (obligāts)..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button class="btn-confirm" onclick="confirmClose()">Apstiprināt</button>
            <button class="action-btn" style="background: #eeeeee; color: #333333;" onclick="closeModal()">Atcelt</button>
        </div>
    </div>
</div>

<script>

let visasZinas = []; 
let izveletaRinda; 

window.onload = () => {
    const nosaukums = localStorage.getItem('uznemuma_nosaukums') || "Iestāde";
    const kods = localStorage.getItem('uznemuma_atslega') || "---";
    
    document.getElementById('company-title').innerText = nosaukums;
    document.getElementById('key-title').innerText = kods;

    ieladetDatus();
};

function ieladetDatus() {
    visasZinas = JSON.parse(localStorage.getItem('sent_reports')) || [];
    zimetTabulu(visasZinas);
}

function zimetTabulu(dati) {
    const tbody = document.getElementById('table-body');
    if (!tbody) return;

    if (dati.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">Nav saņemtu ziņojumu.</td></tr>';
        return;
    }

    tbody.innerHTML = dati.map(z => {
        const statusi = {"Jauns": "status-new", "Procesā": "status-process", "Atrisināti": "status-closed"};
        const klase = statusi[z.statuss] || "status-new";
        
        const isDisabled = z.statuss === "Atrisināti" ? "disabled" : "";
        const btnText = z.statuss === "Atrisināti" ? "Slēgts" : "Slēgt";

        return `
            <tr data-id="${z.id}">
                <td>${z.datums}</td> <td style="font-size: 11px; color: #888;">${z.id}</td> <td>${z.veids}</td>
                <td>${z.zinojums}</td>
                <td><strong>${z.steidzamiba}</strong></td>
                <td><span class="status ${klase}">${z.statuss}</span></td>
                <td><button class="action-btn" style="opacity: ${isDisabled ? '0.5' : '1'}" ${isDisabled} onclick="atvertModal(this)">${btnText}</button></td>
            </tr>`;
    }).join('');
}

function applyFilters() {
    const fType = document.getElementById('filter-type').value.toLowerCase();
    const fUrg = document.getElementById('filter-urgency').value.toLowerCase();
    const fStat = document.getElementById('filter-status').value.toLowerCase();

    const rezultats = visasZinas.filter(z => {
        const matchType = (fType === 'all' || z.veids.toLowerCase().includes(fType));
        const matchUrgency = (fUrg === 'all' || z.steidzamiba.toLowerCase().includes(fUrg));
        const matchStatus = (fStat === 'all' || z.statuss.toLowerCase().includes(fStat));
        return matchType && matchUrgency && matchStatus;
    });

    zimetTabulu(rezultats);
}

function resetFilters() {
    ['filter-type', 'filter-urgency', 'filter-status'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = 'all';
    });
    zimetTabulu(visasZinas);
}

function atvertModal(poga) {
    izveletaRinda = poga.closest('tr');
    document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('admin-comment').value = '';
}

function confirmClose() {
    const msg = document.getElementById('admin-comment').value;
    const reason = document.getElementById('close-reason').options[document.getElementById('close-reason').selectedIndex].text;

    if (msg.trim().length < 5) return alert("Lūdzu, ierakstiet paskaidrojumu!");

    const reportId = izveletaRinda.getAttribute('data-id');
    
    const index = visasZinas.findIndex(z => z.id === reportId);

    if (index !== -1) {
        visasZinas[index].statuss = "Atrisināti";
        visasZinas[index].atbilde = reason + ". " + msg; 
        
        localStorage.setItem('sent_reports', JSON.stringify(visasZinas));
    }

    zimetTabulu(visasZinas);
    closeModal();
    alert("Ziņojums slēgts. Darbinieks tagad var redzēt Jūsu atbildi pēc koda: " + reportId);
}
</script>


</body>
</html>

<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
            <title>Izveidot jaunu ziņojumu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="portal-card">
        <h1>Jauns ziņojums</h1>
        <div id="org-display" style="color:#0056b3; font-weight:bold; margin-bottom:15px;"></div>
        </div>
</body>
<body>

<div class="form-card">
    <h2>Izveidot jaunu ziņojumu</h2>
    <form id="reportForm">
        <label for="type">Ziņojuma veids:</label>
        <select id="type">
            <option value="uzlabojums">💡 Ieteikums uzlabojumam</option>
            <option value="parkapums">⚠️ Ziņot par pārkāpumu</option>
            <option value="cits">Citi novērojumi</option>
        </select>

        <label for="urgency">Steidzamība:</label>
        <select id="urgency">
            <option value="zema">Zema (izskatīt tuvākajā laikā)</option>
            <option value="vidēja">Vidēja (nepieciešama uzmanība)</option>
            <option value="augsta">Augsta (steidzami!)</option>
        </select>

        <label for="message">Apraksts:</label>
        <textarea id="message" placeholder="Lūdzu, aprakstiet situāciju detalizēti..."></textarea>

        <button type="button" class="btn-send" onclick="sendData()">Nosūtīt anonīmi</button>
    </form>

    <a href="index.html" class="back-link">Atgriezties uz sākumu</a>
</div>


<script>

        window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const orgKey = params.get('key') || localStorage.getItem('uznemuma_atslega') || 'NAV NORĀDĪTS';
        const orgName = localStorage.getItem('uznemuma_nosaukums') || 'Iestāde';

        document.getElementById('org-display').innerText = orgName + " (Kods: " + orgKey + ")";
    };

    function sendData() {
        const typeSelect = document.getElementById('type');
        const urgencySelect = document.getElementById('urgency');
        const messageText = document.getElementById('message').value;

        const typeLabel = typeSelect.options[typeSelect.selectedIndex].text.replace(/^[^\s]+\s/, ''); 
        const urgencyLabel = urgencySelect.options[urgencySelect.selectedIndex].text.split(' (')[0]; 

        if (messageText.trim().length < 5) {
            alert("Lūdzu, aprakstiet ziņojumu sīkāk (vismaz 5 simboli)!");
            return;
        }

        const reportID = "ID-" + Math.floor(1000 + Math.random() * 9000);

        const newReport = {
            id: reportID,
            datums: new Date().toLocaleDateString('lv-LV'),
            veids: typeLabel,
            zinojums: messageText,
            steidzamiba: urgencyLabel,
            statuss: "Jauns",
            atbilde: ""
        };

        let localReports = JSON.parse(localStorage.getItem('sent_reports')) || [];
        localReports.unshift(newReport);
        localStorage.setItem('sent_reports', JSON.stringify(localReports));


        alert("Paldies! Jūsu ziņojums ir nosūtīts.\n\nLūdzu, pierakstiet savu izsekošanas kodu: " + reportID);
        
        window.location.href = "index.html"; 
    }
    
</script>


</body>
